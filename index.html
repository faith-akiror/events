<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faith Events Co - Event Manager</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="main-header">
        <div class="container header-container">
            <a href="index.html" class="header-brand">Faith Events Co</a>
            <nav class="main-nav">
                <a href="index.html">Home</a>
            </nav>
        </div>
    </header>

    <div id="login-overlay">
        <div class="container login-container">
            <h2>Admin Login</h2>
            <form id="loginForm">
                <input type="password" id="password" placeholder="Password" required>
                <button type="submit">Login</button>
                <p id="login-error" style="color: red; display: none;">Incorrect password.</p>
            </form>
        </div>
    </div>

    <div id="main-content" style="display: none;">
        <div class="container">
            <h1>All Events</h1>
            
            <h2 id="form-title">Create New Event</h2>
            <form id="eventForm">
                <input type="hidden" id="editingEventId">
                <input type="text" id="eventName" placeholder="Event Name" required>
                <input type="date" id="eventDate" required>
                <input type="text" id="eventVenue" placeholder="Event Venue" required>
                <input type="time" id="eventTime" required>
                <button type="submit" id="submit-button">Create Event</button>
                <button type="button" id="cancel-edit-button" onclick="resetForm()" style="display: none; background-color: #6c757d;">Cancel Edit</button>
            </form>

            <h2 style="margin-top: 30px;">Existing Events</h2>
            <div id="event-list"></div>
        </div>

        <div class="container" style="margin-top: 30px;">
            <h2>Admin Actions</h2>
            <p>Warning: These actions cannot be undone.</p>
            <button onclick="deleteAllTickets()" style="background-color: #dc3545;">Clear All Registered Tickets</button>
            <button onclick="seedInitialDataToFirestore()" style="background-color: #ffc107; color: #212529;">Seed Initial Events</button>
        </div>
    </div>


    <!-- Firebase SDKs must be loaded first -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <!-- Then your Firebase config -->
    <script src="firebase-init.js"></script>
    <!-- Then your app logic and data files -->
    <script src="events-data.js"></script>
    <script src="app.js"></script>
    <script>

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const password = document.getElementById('password').value;
            const loginError = document.getElementById('login-error');
            
            // You can change this password to whatever you like.
            const CORRECT_PASSWORD = 'faithadmin';

            console.log('Login attempt started');
            console.log('Password entered:', password);

            if (password === CORRECT_PASSWORD) {
                console.log('Password is correct');
                // Hide login and show main content
                const loginOverlay = document.getElementById('login-overlay');
                const mainContent = document.getElementById('main-content');
                
                console.log('Hiding login overlay');
                loginOverlay.style.display = 'none';
                
                console.log('Showing main content');
                mainContent.style.display = 'block';
                
                // Store login state in sessionStorage to stay logged in during the session
                sessionStorage.setItem('isLoggedIn', 'true');
                console.log('Session storage updated');

                // Now that we are logged in, initialize the admin functionality
                console.log('Calling initializeAdminPage');
                try {
                    initializeAdminPage();
                    console.log('initializeAdminPage completed');
                } catch (error) {
                    console.error('Error in initializeAdminPage:', error);
                }
            } else {
                console.log('Password is incorrect');
                loginError.style.display = 'block';
            }
        });

        async function renderEvents() {
            // Fetch events from Firestore
            const events = await getEvents();
            const listElement = document.getElementById('event-list');
            listElement.innerHTML = '';

            if (events.length === 0) {
                listElement.innerHTML = '<p>No events created yet.</p>';
                return;
            }

            events.forEach(event => {
                const card = document.createElement('div');
                card.className = 'event-list-card'; // Use a new, specific class
                card.innerHTML = `
                    <div class="event-info-wrapper">
                        <a href="dashboard.html?eventId=${event.id}" style="text-decoration: none; color: inherit; display: block;">
                            <strong>${event.name}</strong><br><small>${event.date} at ${event.venue}</small>
                        </a>
                    </div>
                    <button onclick="event.stopPropagation(); editEvent('${event.id}')" class="edit-button">Edit</button>
                `;
                listElement.appendChild(card);
            });
        }

        async function editEvent(eventId) {
            const eventToEdit = await getEventById(eventId);
            if (!eventToEdit) return;

            document.getElementById('editingEventId').value = eventToEdit.id;
            document.getElementById('eventName').value = eventToEdit.name;
            document.getElementById('eventDate').value = eventToEdit.date;
            document.getElementById('eventVenue').value = eventToEdit.venue;
            document.getElementById('eventTime').value = eventToEdit.time;

            document.getElementById('form-title').textContent = 'Edit Event';
            document.getElementById('submit-button').textContent = 'Update Event';
            document.getElementById('cancel-edit-button').style.display = 'inline-block';
            window.scrollTo(0, 0); // Scroll to top to see the form
        }

        function resetForm() {
            document.getElementById('eventForm').reset();
            document.getElementById('editingEventId').value = '';
            document.getElementById('form-title').textContent = 'Create New Event';
            document.getElementById('submit-button').textContent = 'Create Event';
            document.getElementById('cancel-edit-button').style.display = 'none';
        }

        // This function sets up all the event listeners and initial rendering for the main content.
        // It should only be called AFTER a successful login.
        function initializeAdminPage() {
            document.getElementById('eventForm').addEventListener('submit', async function(e) {
                e.preventDefault();

                const editingId = document.getElementById('editingEventId').value;
                const eventData = {
                    name: document.getElementById('eventName').value,
                    date: document.getElementById('eventDate').value,
                    venue: document.getElementById('eventVenue').value,
                    time: document.getElementById('eventTime').value,
                };

                try {
                    if (editingId) {
                        await updateEvent(editingId, eventData);
                        alert(`Event "${eventData.name}" updated successfully!`);
                    } else {
                        // Create new event in Firestore. Note: Firestore auto-generates IDs with .add()
                        // If you want to use your own IDs, you need to use .doc(id).set()
                        await createEvent(eventData);
                        alert(`Event "${eventData.name}" created successfully!`);
                    }
                } catch (error) {
                    console.error("Error saving event: ", error);
                    alert("Failed to save event. See console for details.");
                }

                resetForm();
                renderEvents();
            });

            // Initial render of events when the page is shown.
            renderEvents().catch(error => {
                console.error('Error rendering events:', error);
                const listElement = document.getElementById('event-list');
                if (listElement) {
                    listElement.innerHTML = '<p style="color: red;">Error loading events. Please check Firebase configuration and ensure you have seeded initial data.</p>';
                }
            });
        }

        window.addEventListener('load', () => {
            // Check if user is already logged in for this session
            if (sessionStorage.getItem('isLoggedIn') === 'true') {
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
                initializeAdminPage(); // Initialize the page since we are already logged in.
            }
            // Otherwise, the login overlay will remain visible by default.
        });
    </script>
</body>
</html>
