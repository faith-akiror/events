<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Tickets</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="styles.css">
</head>
<style>
    .ticket-details-card {
        border: 1px solid #ccc;
        border-radius: 8px;
        padding: 15px;
        margin-bottom: 10px;
        background-color: #f9f9f9;
    }

    .ticket-summary {
        cursor: pointer;
        font-weight: bold;
    }

    .ticket-content {
        margin-top: 15px;
        padding-top: 15px;
        border-top: 1px solid #eee;
        display: flex;
        flex-wrap: wrap;
        gap: 20px;
        align-items: center;
    }

    .ticket-info {
        flex-grow: 1;
    }

    .qr-code-container {
        flex-shrink: 0;
        background: white;
        border: 1px solid #ddd;
        /* Use flexbox to center the QR code inside */
        display: flex;
        justify-content: center;
        align-items: center;
    }

    /* New styles for the downloadable ticket layout */
    .ticket-layout {
        display: block; /* Change to block for vertical layout */
        padding: 15px 5px 5px 5px; /* Reduced bottom padding to remove extra space */
        background-color: white;
        text-align: center; /* Center align content */
    }
    .ticket-header, .ticket-body, .ticket-footer {
        padding: 5px 0; /* Slightly increased vertical padding for better spacing */
        position: relative; /* Establish positioning context for z-index */
        z-index: 2; /* Place text content above the circles */

    }
    .ticket-body .qr-code-container {
        margin: 5px auto; /* Reduced margin and centers the QR code block */
        width: 110px; /* Set a fixed width for the container */
        height: 110px; /* Set a fixed height to match width */
    }
    .ticket-footer {
        text-align: center;
        margin-top: 5px;
        padding-top: 2px;
        font-size: 0.8em;
        color: rgb(255, 255, 255);
    }

    /* Special styles for the Power FM event ticket */
    .powerfm-ticket-bg {
        background-color: #2d1a93 !important;
        color: white;
        position: relative;
        overflow: hidden; /* Keeps circles contained */
    }
    .powerfm-ticket-bg .ticket-layout {
        background-color: transparent; /* Allow parent background to show through */
    }
    .powerfm-ticket-bg h3, .powerfm-ticket-bg p, .powerfm-ticket-bg .ticket-footer {
        color: white;
    }

    .deco-circle {
        position: absolute;
        background-color: #f8ef23;
        border-radius: 50%;
        z-index: 1; /* Place circles on a lower layer */
    }
    .circle-1 { width: 100px; height: 100px; top: -50px; left: -50px; }
    .circle-2 { width: 50px; height: 50px; top: 20%; right: -25px; }
    .circle-3 { width: 80px; height: 80px; bottom: 100px; left: -30px; } /* Moved up and to the side */
    .circle-4 { width: 90px; height: 70px; bottom: 2px; right: -80px; } /* Pushed further down and right */
    .circle-5 { width: 30px; height: 30px; bottom: 25px; left: 45%; } /* Moved circle up */

    /* New styles for the flower-themed ticket */
    .flower-ticket-bg {
        background-color: #191970; /* Midnight Blue */
        color: white; /* Change default text to white for contrast */
        position: relative;
        overflow: hidden;
    }
    .flower-ticket-bg .ticket-layout {
        background-color: transparent;
    }
    .flower-ticket-bg .ticket-footer {
        color: #ffffff; /* Make footer text white */
    }
    .deco-flower-img {
        position: absolute;
        z-index: 1;
        opacity: 0.5;
        width: 60px; /* Base size for flowers */
        height: auto;
    }
    /* Positioning for each flower image */
    .flower-1 { top: -15px; left: 5%; width: 70px; transform: rotate(-15deg); }
    .flower-2 { top: 25%; right: -20px; width: 50px; transform: rotate(20deg); }
    .flower-3 { bottom: 40px; left: -10px; width: 80px; transform: rotate(10deg); }
    .flower-4 { bottom: 50px; right: 5%; width: 90px; transform: rotate(-5deg); }
    .flower-5 { bottom: 5px; left: 35%; width: 40px; }


</style>

<body>
    <div class="container">
        <button id="back-to-dashboard" style="float: right;">Back to Dashboard</button>
        <h2 id="event-name-header" style="text-align: center; color: #555;"></h2>
        <h1>Event Tickets</h1>
        <div id="tickets-list"></div>
    </div>

    <!-- Libraries for QR Code, PDF, and JPG generation -->
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="firebase-init.js"></script> <!-- Your new config file -->

    <script src="app.js"></script>

    <script>
        window.onload = function() {
            // Security Check: Admins only
            if (sessionStorage.getItem('userRole') !== 'admin') {
                window.location.href = 'index.html';
                return;
            }

            const urlParams = new URLSearchParams(window.location.search);
            const eventId = urlParams.get('eventId');
            if (!eventId) {
                window.location.href = 'index.html';
                return;
            }

            // Fetch data from Firebase
            displayTickets(eventId);
        };

        async function displayTickets(eventId) {
            const event = await getEventById(eventId);
            document.getElementById('event-name-header').textContent = `Tickets for: ${event.name}`;
            document.getElementById('back-to-dashboard').onclick = () => window.location.href = `dashboard.html?eventId=${eventId}`;
            
            const ticketsForEvent = await getTicketsForEvent(eventId);
            const listElement = document.getElementById('tickets-list');

            if (ticketsForEvent.length === 0) {
                listElement.innerHTML = '<p>No tickets found for this event.</p>';
                return;
            }
            
            ticketsForEvent
                .sort((a, b) => a.names[0].localeCompare(b.names[0])) // Sort by first name
                .forEach((ticket, index) => {
                    const ticketContentId = `ticket-content-${ticket.id}`;
                    const detailsElement = document.createElement('details');
                    detailsElement.className = 'ticket-details-card';

                    const summaryElement = document.createElement('summary');
                    summaryElement.className = 'ticket-summary';
                    const checkedInStatus = ticket.checkedIn ? ` (Checked-in)` : ` (Not Checked-in)`;
                    summaryElement.innerHTML = `${ticket.names.join(', ')} <em style="font-weight: normal;">${checkedInStatus}</em>`;

                    const contentWrapper = document.createElement('div');

                    // --- Conditional Styling for Power FM Event ---
                    const eventNameLower = event.name.toLowerCase();
                    const isPowerFmEvent = eventNameLower === 'power fm love family fun day';
                    const isFlowerEvent = eventNameLower === 'june love family fun day';

                    let backgroundClass = '';
                    let decorativeElements = '';

                    if (isPowerFmEvent) {
                        backgroundClass = 'powerfm-ticket-bg';
                        decorativeElements = `
                            <div class="deco-circle circle-1"></div>
                            <div class="deco-circle circle-2"></div>
                            <div class="deco-circle circle-3"></div>
                            <div class="deco-circle circle-4"></div>
                            <div class="deco-circle circle-5"></div>
                        `;
                    } else if (isFlowerEvent) {
                        backgroundClass = 'flower-ticket-bg';              
                        // Using the flower image you added to the project files.
                        const flowerImageSrc = "flowers_3__95798-removebg-preview.png"; // Assumes flower.png is in the same folder as your html files.
                        decorativeElements = `
                            <img src="${flowerImageSrc}" class="deco-flower-img flower-1" alt="">
                            <img src="${flowerImageSrc}" class="deco-flower-img flower-2" alt="">
                            <img src="${flowerImageSrc}" class="deco-flower-img flower-3" alt="">
                            <img src="${flowerImageSrc}" class="deco-flower-img flower-4" alt="">
                            <img src="${flowerImageSrc}" class="deco-flower-img flower-5" alt="">
                        `;
                    }

                    // The ticket's visual content now has a unique ID for capturing
                    const content = `
                        <div id="${ticketContentId}" class="${backgroundClass}" style="border: 1px solid #ddd; border-radius: 8px; max-width: 320px; margin: auto; position: relative;">
                            <div class="ticket-layout">${decorativeElements}
                                <div class="ticket-header">
                                    <h3>${event.name}</h3>
                                    <p>${event.date} at ${event.time} | ${event.venue}</p>
                                    <p><strong>Attendee(s):</strong> ${ticket.names.join(', ')}</p>
                                </div>
                                <div class="ticket-body">
                                    <div class="qr-code-container" id="qr-${ticket.id}"></div>
                                </div>
                                <div class="ticket-footer">Created with ❤️ By Faith Creative Studio 0773402318/0772307861</div>
                            </div>
                        </div>
                        <div class="actions" style="margin-top: 15px;">
                            <button onclick="downloadAsPDF('${ticketContentId}', '${ticket.names[0]}-ticket.pdf')">Download PDF</button>
                            <button onclick="downloadAsJPG('${ticketContentId}', '${ticket.names[0]}-ticket.jpg')">Download JPG</button>
                            <button onclick="shareTicket('${ticketContentId}', '${ticket.names.join(', ')}', '${event.name}', '${event.venue}', '${event.time}')">Share Ticket</button>
                        </div>
                    `;
                    contentWrapper.innerHTML = content;

                    detailsElement.appendChild(summaryElement);
                    detailsElement.appendChild(contentWrapper);
                    listElement.appendChild(detailsElement);

                    // Generate QR Code
                    new QRCode(document.getElementById(`qr-${ticket.id}`), {
                        text: ticket.id,
                        width: 90,
                        height: 90,
                    });
                });
        }

        function downloadAs(elementId, filename, type) {
            const ticketElement = document.getElementById(elementId);
            if (!ticketElement) return;

            html2canvas(ticketElement, { scale: 2 }).then(canvas => {
                if (type === 'pdf') {
                    const imgData = canvas.toDataURL('image/png');
                    const pdf = new jspdf.jsPDF({
                        orientation: 'portrait',
                        unit: 'px',
                        format: [canvas.width, canvas.height]
                    });
                    pdf.addImage(imgData, 'PNG', 0, 0, canvas.width, canvas.height);
                    pdf.save(filename);
                } else { // jpg
                    const link = document.createElement('a');
                    link.download = filename;
                    link.href = canvas.toDataURL('image/jpeg', 0.9);
                    link.click();
                }
            });
        }

        function downloadAsPDF(elementId, filename) {
            downloadAs(elementId, filename, 'pdf');
        }

        function downloadAsJPG(elementId, filename) {
            downloadAs(elementId, filename, 'jpg');
        }

        async function shareTicket(elementId, names, eventName, eventVenue, eventTime) {
            const ticketElement = document.getElementById(elementId);
            if (!ticketElement) return;

            // Generate the ticket image as a file
            const canvas = await html2canvas(ticketElement, { scale: 2 });
            const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/png'));
            const file = new File([blob], 'ticket.png', { type: 'image/png' });

            const shareMessage = `Thank you for registering, ${names}! Here is your ticket for ${eventName}. See you at ${eventVenue} at ${eventTime}!`;

            // --- Primary Method: Web Share API ---
            // This is the best user experience, as it opens the native share dialog.
            if (navigator.share && navigator.canShare({ files: [file] })) {
                try {
                    await navigator.share({
                        title: `Your Ticket for ${eventName}`,
                        text: shareMessage,
                        files: [file],
                    });
                    return; // Success, no need for fallback
                } catch (error) {
                    // User might have cancelled the share, so we don't show an error.
                    // If it's a real error, it will be in the console.
                    console.error('Error using Web Share API:', error);
                }
            }

            // --- Fallback Method: Manual Share ---
            // This runs if the Web Share API is not supported by the browser.
            alert("Your browser doesn't support direct sharing. We will guide you through sharing to WhatsApp manually.");

            // Step 1: Prompt to download the ticket
            if (!confirm("First, you need to save the ticket as a JPG. Click OK to download.")) {
                return; // User cancelled the download
            }
            downloadAsJPG(elementId, `${names.split(',')[0]}-ticket.jpg`);

            // Step 2: Get the phone number
            let phone = prompt("Now, enter the recipient's WhatsApp number (with country code, e.g., 263773402318):");
            if (phone) {
                phone = phone.replace(/\D/g, '');
                const whatsappLink = `https://wa.me/${phone}?text=${encodeURIComponent(shareMessage)}`;
                
                // Step 3: Open WhatsApp and instruct the user
                alert("A new tab for WhatsApp will open. Please attach the JPG file you just downloaded to the chat and send it.");
                window.open(whatsappLink, '_blank');
            } else {
                alert("No phone number entered. Share cancelled.");
            }
        }

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(registration => console.log('ServiceWorker registration successful with scope: ', registration.scope))
                    .catch(err => console.log('ServiceWorker registration failed: ', err));
            });
        }
    </script>
</body>

</html>
